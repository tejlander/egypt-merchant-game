<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Egyptian Merchant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand: #f4e8c1;
    --sand-dark: #e8d5a0;
    --sand-deep: #d4b96a;
    --lapis: #30459e;
    --lapis-mid: #3d58bb;
    --lapis-light: #4d6fdb;
    --gold: #c8960c;
    --gold-light: #f5c842;
    --papyrus: #f9f0d8;
    --ink: #2a1a08;
    --copper: #8b4513;
    --red-clay: #8b2020;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0d1117;
  }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
  }

  #game-shell {
    width: 100%;
    max-width: 1400px;
    height: calc(100vh - 24px);
    display: flex;
    flex-direction: column;
    background: linear-gradient(170deg, #f9f0d8 0%, #f4e8c1 40%, #edd89a 100%);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px #c8960c, 0 8px 40px rgba(0,0,0,0.6), 0 0 80px rgba(200,150,12,0.15);
  }

  #game-shell::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(200,150,12,0.35);
    border-radius: 10px;
    pointer-events: none;
    z-index: 10;
  }

  .corner { position: absolute; width: 40px; height: 40px; z-index: 11; pointer-events: none; }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 4px; left: 4px; }
  .corner-tr { top: 4px; right: 4px; transform: scaleX(-1); }
  .corner-bl { bottom: 4px; left: 4px; transform: scaleY(-1); }
  .corner-br { bottom: 4px; right: 4px; transform: scale(-1,-1); }

  /* Header */
  #header {
    padding: 10px 24px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(200,150,12,0.3);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
    gap: 12px;
  }

  #header-centre {
    flex: 1;
    text-align: center;
  }

  #header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(16px, 2.4vw, 30px);
    font-weight: 700;
    color: var(--lapis);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1.1;
  }

  #header h1 span { color: var(--gold); }

  #header p {
    font-family: Georgia, serif;
    font-size: clamp(10px, 1.2vw, 13px);
    color: var(--copper);
    letter-spacing: 0.06em;
    margin-top: 2px;
    font-style: italic;
  }

  #logo-wrap {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  #logo-wrap img {
    height: clamp(36px, 5vw, 62px);
    width: auto;
    display: block;
    /* mix-blend-mode so it sits naturally on the papyrus */
    mix-blend-mode: multiply;
  }

  #header-spacer {
    flex: 0 0 auto;
    /* mirrors logo side so title stays centred */
  }

  /* Main content */
  #content {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  #img-panel {
    flex: 0 0 52%;
    position: relative;
    overflow: hidden;
    border-right: 1px solid rgba(200,150,12,0.3);
  }

  #scene-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transition: opacity 0.4s ease;
  }

  #scene-img.fade { opacity: 0; }

  #img-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 70%, rgba(249,240,216,0.4) 100%);
    pointer-events: none;
  }

  #text-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #narration {
    flex: 1;
    padding: clamp(16px, 2vw, 28px) clamp(16px, 2vw, 32px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  #narration p {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: clamp(15px, 1.7vw, 22px);
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 0.6em;
  }

  #narration p:last-child { margin-bottom: 0; }

  #narration p.emphasised {
    font-weight: 600;
    font-size: clamp(16px, 1.9vw, 24px);
    color: var(--lapis);
  }

  #narration p.result-bad {
    font-weight: 600;
    color: var(--red-clay);
    font-size: clamp(16px, 1.9vw, 24px);
  }

  #narration p.result-good {
    font-weight: 600;
    color: #1a5c1a;
    font-size: clamp(16px, 1.9vw, 24px);
  }

  /* Choices */
  #choices {
    padding: clamp(8px, 1.2vw, 14px) clamp(16px, 2vw, 32px) clamp(8px, 1vw, 14px);
    border-top: 1px solid rgba(200,150,12,0.25);
    display: flex;
    flex-direction: column;
    gap: clamp(5px, 0.7vw, 9px);
    flex-shrink: 0;
  }

  .choice-btn {
    background: #30459e;
    color: #f4e8c1;
    border: none;
    border-radius: 8px;
    padding: clamp(7px, 0.9vw, 11px) clamp(14px, 1.5vw, 20px);
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 1.2vw, 15px);
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
    line-height: 1.3;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 0 rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .choice-btn:hover {
    background: var(--lapis-light);
    transform: translateY(-2px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    color: #fff;
  }

  .choice-btn:active {
    transform: translateY(0);
    box-shadow: 0 1px 0 rgba(0,0,0,0.25);
  }

  .choice-btn.accent {
    background: var(--gold);
    color: var(--lapis);
  }

  .choice-btn.accent:hover {
    background: var(--gold-light);
  }

  /* Footer */
  #footer {
    padding: 5px 24px;
    text-align: center;
    border-top: 1px solid rgba(200,150,12,0.2);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }

  #footer p {
    font-family: Georgia, serif;
    font-size: clamp(9px, 1vw, 11px);
    color: var(--copper);
    opacity: 0.75;
    letter-spacing: 0.05em;
  }

  .deco-strip {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,150,12,0.4), transparent);
  }

  /* Mobile */
  @media (max-width: 700px) {
    html, body { overflow: auto; }
    body { padding: 8px; align-items: flex-start; }
    #game-shell { height: auto; min-height: calc(100vh - 16px); flex-direction: column; }
    #content { flex-direction: column; overflow: visible; }
    #img-panel { flex: none; height: 42vw; border-right: none; border-bottom: 1px solid rgba(200,150,12,0.3); }
    #text-panel { overflow: visible; }
    #narration { flex: none; overflow: visible; }
    #choices { overflow: visible; }
    #img-panel::after { background: linear-gradient(to bottom, transparent 70%, rgba(249,240,216,0.4) 100%); }
    #header-spacer { display: none; }
    #logo-wrap img { height: 32px; }
  }

  #narration::-webkit-scrollbar { width: 6px; }
  #narration::-webkit-scrollbar-track { background: transparent; }
  #narration::-webkit-scrollbar-thumb { background: rgba(200,150,12,0.3); border-radius: 3px; }

  #overlay {
    position: absolute;
    inset: 0;
    background: var(--sand);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 20;
    border-radius: 16px;
  }
  #overlay.active { opacity: 0.7; pointer-events: all; }
</style>

const img = document.getElementById('scene-img');
const narration = document.getElementById('narration');
const choices = document.getElementById('choices');
const overlay = document.getElementById('overlay');

function goTo(sceneId) {
  overlay.classList.add('active');
  img.classList.add('fade');
  setTimeout(() => {
    render(sceneId);
    overlay.classList.remove('active');
    img.classList.remove('fade');
  }, 280);
}

function render(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) return;
  img.src = BASE + scene.img;
  narration.innerHTML = '';
  scene.text.forEach(item => {
    const p = document.createElement('p');
    if (typeof item === 'string') { p.textContent = item; }
    else { p.className = item.cls || ''; p.textContent = item.t; }
    narration.appendChild(p);
  });
  choices.innerHTML = '';
  scene.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (c.accent ? ' accent' : '');
    btn.textContent = c.label;
    btn.addEventListener('click', () => goTo(c.go));
    choices.appendChild(btn);
  });
  narration.scrollTop = 0;
}
